# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
# vim: set ts=2 sw=2 tw=0 fo=jcroql
version: 2
pro: true

project_name: arcane

before:
  hooks:
    - just deps install all
    - just build single frontend
    - mkdir -p completions
    - sh -c 'cd cli && go run . completion bash > ../completions/arcane-cli.bash'
    - sh -c 'cd cli && go run . completion zsh > ../completions/arcane-cli.zsh'
    - sh -c 'cd cli && go run . completion fish > ../completions/arcane-cli.fish'

builds:
  - id: arcane
    main: ./cmd/main.go
    dir: backend
    binary: arcane
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - '386'
      - arm
    goarm:
      - '7'
    goamd64:
      - v1
    go386:
      - sse2
    ldflags:
      - -w -s
      - -buildid={{ .Version }}
      - -X github.com/getarcaneapp/arcane/backend/internal/config.Version={{ .Version }}
      - -X github.com/getarcaneapp/arcane/backend/internal/config.Revision={{ .ShortCommit }}
      - -X github.com/getarcaneapp/arcane/backend/internal/config.BuildTime={{ .Date }}
    flags:
      - -trimpath
    mod_timestamp: '{{ .CommitTimestamp }}'

  - id: arcane-agent
    main: ./cmd/main.go
    dir: backend
    binary: arcane-agent
    tags:
      - exclude_frontend
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - '386'
      - arm
    goarm:
      - '7'
    goamd64:
      - v1
    go386:
      - sse2
    ldflags:
      - -w -s
      - -buildid={{ .Version }}
      - -X github.com/getarcaneapp/arcane/backend/internal/config.Version={{ .Version }}
      - -X github.com/getarcaneapp/arcane/backend/internal/config.Revision={{ .ShortCommit }}
      - -X github.com/getarcaneapp/arcane/backend/internal/config.BuildTime={{ .Date }}
    flags:
      - -trimpath
    mod_timestamp: '{{ .CommitTimestamp }}'

  - id: arcane-cli
    main: .
    dir: cli
    binary: arcane-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - '386'
      - arm
    goarm:
      - '7'
    goamd64:
      - v1
    go386:
      - sse2
    ldflags:
      - -w -s
      - -buildid={{ .Version }}
      - -X github.com/getarcaneapp/arcane/cli/internal/config.Version={{ .Version }}
      - -X github.com/getarcaneapp/arcane/cli/internal/config.Revision={{ .ShortCommit }}
    flags:
      - -trimpath
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: arcane-cli-archive
    ids:
      - arcane-cli
    formats:
      - tar.gz
    name_template: '{{ .Binary }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}'
    files:
      - src: completions/arcane-cli.bash
        dst: completions/arcane-cli.bash
      - src: completions/arcane-cli.zsh
        dst: completions/arcane-cli.zsh
      - src: completions/arcane-cli.fish
        dst: completions/arcane-cli.fish
  - id: default
    ids:
      - arcane
      - arcane-agent
    formats:
      - binary
    name_template: '{{ .Binary }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}'

upx:
  - enabled: true
    ids:
      - arcane
      - arcane-agent
      - arcane-cli
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
      - '386'
    goarm:
      - '7'
    goamd64:
      - v1
    compress: best
    lzma: true
    brute: true

nfpms:
  - id: arcane-cli
    package_name: arcane-cli
    file_name_template: '{{ .ConventionalFileName }}'
    ids:
      - arcane-cli
    vendor: getarcaneapp
    homepage: https://getarcane.app
    maintainer: Kyle Mendell <ksm@ofkm.us>
    description: |-
      Arcane CLI - Modern Docker Management, Designed for Everyone.
      This is the command-line interface for Arcane.
    license: BSD-3-Clause
    formats:
      - apk
      - deb
      - rpm
      - archlinux
    bindir: /usr/bin
    contents:
      - src: ./cli/README.md
        dst: /usr/share/doc/arcane-cli/README.md
      - src: ./LICENSE
        dst: /usr/share/doc/arcane-cli/LICENSE

homebrew_casks:
  - name: arcane-cli
    ids:
      - arcane-cli-archive
    binaries:
      - arcane-cli
    completions:
      bash: completions/arcane-cli.bash
      zsh: completions/arcane-cli.zsh
      fish: completions/arcane-cli.fish
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/arcane-cli"]
          end
    description: 'Arcane CLI - Modern Docker Management, Designed for Everyone.'
    homepage: 'https://getarcane.app'
    skip_upload: '{{ if eq (index .Env "BUILD_NEXT") "true" }}true{{ end }}'
    repository:
      owner: getarcaneapp
      name: homebrew-tap
    commit_msg_template: 'chore(brew): update {{ .ProjectName }} to {{ .Tag }}'

dockers_v2:
  - id: arcane-next
    ids:
      - arcane
    dockerfile: docker/next-builds/Dockerfile-static
    images:
      - 'ghcr.io/getarcaneapp/arcane'
    tags:
      - 'next-static'
      - '{{.Tag}}'
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    labels:
      'org.opencontainers.image.authors': 'OFKM Technologies'
      'org.opencontainers.image.url': 'https://github.com/getarcaneapp/arcane'
      'org.opencontainers.image.documentation': 'https://github.com/getarcaneapp/arcane/blob/main/README.md'
      'org.opencontainers.image.source': 'https://github.com/getarcaneapp/arcane'
      'org.opencontainers.image.version': '{{.Version}}'
      'org.opencontainers.image.revision': '{{.FullCommit}}'
      'org.opencontainers.image.licenses': 'BSD-3-Clause'
      'org.opencontainers.image.title': 'Arcane'
      'org.opencontainers.image.description': 'Modern Docker Management, Made for Everyone'
      'com.getarcaneapp.arcane': 'true'
    disable: '{{ if not (index .Env "BUILD_NEXT") }}true{{ end }}'
    sbom: true

  - id: arcane-agent-next
    ids:
      - arcane-agent
    dockerfile: docker/next-builds/Dockerfile-agent-static
    images:
      - 'ghcr.io/getarcaneapp/arcane-headless'
    tags:
      - 'next-static'
      - '{{.Tag}}'
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    labels:
      'org.opencontainers.image.authors': 'OFKM Technologies'
      'org.opencontainers.image.url': 'https://github.com/getarcaneapp/arcane'
      'org.opencontainers.image.documentation': 'https://github.com/getarcaneapp/arcane/blob/main/README.md'
      'org.opencontainers.image.source': 'https://github.com/getarcaneapp/arcane'
      'org.opencontainers.image.version': '{{.Version}}'
      'org.opencontainers.image.revision': '{{.FullCommit}}'
      'org.opencontainers.image.licenses': 'BSD-3-Clause'
      'org.opencontainers.image.title': 'Arcane Agent'
      'org.opencontainers.image.description': 'Arcane Agent'
      'com.getarcaneapp.arcane.agent': 'true'
    disable: '{{ if not (index .Env "BUILD_NEXT") }}true{{ end }}'
    sbom: true

  - id: arcane-next-distroless
    ids:
      - arcane
    dockerfile: docker/next-builds/Dockerfile-next-distroless
    images:
      - 'ghcr.io/getarcaneapp/arcane'
    tags:
      - 'next-distroless'
      - '{{.Tag}}-distroless'
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    labels:
      'org.opencontainers.image.authors': 'OFKM Technologies'
      'org.opencontainers.image.url': 'https://github.com/getarcaneapp/arcane'
      'org.opencontainers.image.documentation': 'https://github.com/getarcaneapp/arcane/blob/main/README.md'
      'org.opencontainers.image.source': 'https://github.com/getarcaneapp/arcane'
      'org.opencontainers.image.version': '{{.Version}}'
      'org.opencontainers.image.revision': '{{.FullCommit}}'
      'org.opencontainers.image.licenses': 'BSD-3-Clause'
      'org.opencontainers.image.title': 'Arcane'
      'org.opencontainers.image.description': 'Modern Docker Management, Made for Everyone'
      'com.getarcaneapp.arcane': 'true'
    disable: '{{ if not (index .Env "BUILD_NEXT") }}true{{ end }}'
    sbom: true

  - id: arcane-agent-next-distroless
    ids:
      - arcane-agent
    dockerfile: docker/next-builds/Dockerfile-agent-distroless
    images:
      - 'ghcr.io/getarcaneapp/arcane-headless'
    tags:
      - 'next-distroless'
      - '{{.Tag}}-distroless'
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    labels:
      'org.opencontainers.image.authors': 'OFKM Technologies'
      'org.opencontainers.image.url': 'https://github.com/getarcaneapp/arcane'
      'org.opencontainers.image.documentation': 'https://github.com/getarcaneapp/arcane/blob/main/README.md'
      'org.opencontainers.image.source': 'https://github.com/getarcaneapp/arcane'
      'org.opencontainers.image.version': '{{.Version}}'
      'org.opencontainers.image.revision': '{{.FullCommit}}'
      'org.opencontainers.image.licenses': 'BSD-3-Clause'
      'org.opencontainers.image.title': 'Arcane Agent'
      'org.opencontainers.image.description': 'Arcane Agent'
      'com.getarcaneapp.arcane.agent': 'true'
    disable: '{{ if not (index .Env "BUILD_NEXT") }}true{{ end }}'
    sbom: true

blobs:
  - provider: s3
    endpoint: '{{ index .Env "R2_ENDPOINT" }}'
    region: auto
    bucket: '{{ index .Env "R2_BUCKET" }}'
    directory: bin/cli-next
    extra_files_only: true
    extra_files:
      - glob: dist/arcane-cli_linux_amd64_v1/arcane-cli
        name_template: arcane-cli_linux_amd64
      - glob: dist/arcane-cli_linux_arm64_v8.0/arcane-cli
        name_template: arcane-cli_linux_arm64
      - glob: dist/arcane-cli_linux_386_sse2/arcane-cli
        name_template: arcane-cli_linux_386
      - glob: dist/arcane-cli_linux_arm_7/arcane-cli
        name_template: arcane-cli_linux_armv7
      - glob: dist/arcane-cli_darwin_amd64_v1/arcane-cli
        name_template: arcane-cli_darwin_amd64
      - glob: dist/arcane-cli_darwin_arm64_v8.0/arcane-cli
        name_template: arcane-cli_darwin_arm64
    include_meta: false
    disable: '{{ if not (index .Env "BUILD_NEXT") }}true{{ end }}'

  - provider: s3
    endpoint: '{{ index .Env "R2_ENDPOINT" }}'
    region: auto
    bucket: '{{ index .Env "R2_BUCKET" }}'
    ids:
      - default
    directory: bin/arcane-next
    include_meta: false
    disable: '{{ if not (index .Env "BUILD_NEXT") }}true{{ end }}'

changelog:
  disable: true

announce:
  discord:
    enabled: true
    # Default: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'.
    message_template: 'Arcane version {{.Tag}} has been released! Checkout the changelog at {{ .ReleaseURL }}'
    author: 'Github Actions'
    # Color code of the embed. You have to use decimal numeral system, not hexadecimal.
    color: '9320959'
    icon_url: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'

release:
  github:
    owner: getarcaneapp
    name: arcane
  disable: '{{ if index .Env "SKIP_RELEASE" }}true{{ end }}'
  draft: true
  replace_existing_draft: false
  use_existing_draft: true
  replace_existing_artifacts: true
  prerelease: auto
  make_latest: true
  mode: keep-existing
  name_template: '{{.Tag}}'
  footer: |
    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
